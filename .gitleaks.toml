title = "MIRAI gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Ignore generated outputs, dependencies and local env files"
paths = [
  '''(^|/)node_modules/''',
  '''(^|/)\.next/''',
  '''(^|/)coverage/''',
  '''(^|/)dist/''',
  '''(^|/)build/''',
  '''(^|/)out/''',
  '''\.env.*$''',
]
